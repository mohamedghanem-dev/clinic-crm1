name: Build macOS App

on:
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: dtolnay/rust-toolchain@stable

      - name: Setup Tauri Project
        run: |
          npm init -y
          npm install @tauri-apps/cli @tauri-apps/api

          mkdir dist

          rsync -av \
            --exclude='src-tauri' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='app' \
            ./ dist/

          # تهيئة المشروع
          npx tauri init --ci \
            --app-name "ClinicCRM" \
            --frontend-dist "../dist"

          # تعديل الهوية وضبط الأهداف للماك لضمان نجاح Tauri v2
          node -e '
            const fs = require("fs");
            const configPath = "src-tauri/tauri.conf.json";
            if (fs.existsSync(configPath)) {
              const config = JSON.parse(fs.readFileSync(configPath, "utf8"));
              config.productName = "ClinicCRM";
              config.identifier = "com.clinic.crm";
              if (!config.bundle) config.bundle = {};
              config.bundle.targets = ["dmg"];
              fs.writeFileSync(configPath, JSON.stringify(config, null, 2));
              console.log("🍏 tauri.conf.json adapted for macOS successfully!");
            }
          '

          if [ -f icon_1024.png ]; then
            npx tauri icon icon_1024.png
          elif [ -f icon.png ]; then
            npx tauri icon icon.png
          fi

      - name: Build macOS App
        run: npx tauri build

      - name: Upload macOS Files
        uses: actions/upload-artifact@v4
        with:
          name: Clinic-CRM-macOS
          path: src-tauri/target/release/bundle/dmg/*.dmg
          retention-days: 10
