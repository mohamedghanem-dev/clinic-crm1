name: Test Linux Build Only (Nexus Arab)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # --- بناء تطبيق لينكس (DEB) للتجربة ---
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install system dependencies for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev build-essential curl wget libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
          
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Install Tauri CLI & Setup Project
        run: |
          npm init -y
          npm install @tauri-apps/cli @tauri-apps/api
          mkdir dist
          rsync -av --exclude='src-tauri' --exclude='.github' --exclude='node_modules' --exclude='dist' --exclude='app' . dist/
          npx tauri init --ci --app-name "Clinic_CRM" --frontend-dist "../dist" --dev-url "http://localhost:8080"
          
          # ضبط الأيقونة للينكس
          if [ -f icon.png ]; then
            npx tauri icon icon.png
          elif [ -f icon_1024.png ]; then
            npx tauri icon icon_1024.png
          fi
          
          # ضبط الإعدادات للينكس باستخدام متغير صريح لمنع خطأ الـ sed
          CONFIG_FILE="src-tauri/tauri.conf.json"
          sed -i 's/"com.tauri.dev"/"dev.mohamedghanem.clinic"/' "$CONFIG_FILE"
          sed -i 's/"npm run build": "[^"]*"/"npm run build": null/' "$CONFIG_FILE"
          sed -i 's/"npm run dev": "[^"]*"/"npm run dev": null/' "$CONFIG_FILE"
          
      - name: Build Linux App
        run: npx tauri build
        
      - name: Upload Linux DEB Package
        uses: actions/upload-artifact@v4
        with:
          name: Clinic-CRM-Linux-DEB
          path: src-tauri/target/release/bundle/deb/*.deb
